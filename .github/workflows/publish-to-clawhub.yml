name: Publish to ClawHub

on:
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "版本递增类型"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    # ✅ 修复：从 @v1 改为 @v0.20.0（或 @main）
    uses: openclaw/clawhub/.github/workflows/publish-to-clawhub.yml@v0.20.0
    with:
      owner: ysdhb
      dry_run: true
      skill_path: .

  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    # ✅ 修复：从 @v1 改为 @v0.20.0（或 @main）
    uses: openclaw/clawhub/.github/workflows/publish-to-clawhub.yml@v0.20.0
    with:
      owner: ysdhb
      dry_run: false
      skill_path: .
      bump: >
        ${{
          github.event_name == 'push'
            && (
              contains(github.ref_name, '.0.0') && 'major'
              || contains(github.ref_name, '.0') && 'minor'
              || 'patch'
            )
            || github.event.inputs.bump
        }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
